<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Vault | Digital Album</title>
    <!-- Google Fonts Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --accent: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.25);
            --highlight: #00e5ff;
            --highlight-glow: rgba(0, 229, 255, 0.25);
            --text-main: #f4e4bc;
            --text-muted: #5d4e75;
            --panel-bg: rgba(10, 10, 15, 0.6);
            --border-color: rgba(212, 175, 55, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Subtle retro ambient scanning grids */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 255, 255, 0.01), rgba(0, 255, 255, 0.005), rgba(255, 0, 128, 0.01));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* --- LOCK SCREEN VIEW --- */
        .lock-container {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #0a0a10 0%, #020204 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1), opacity 0.8s ease;
        }

        .lock-card {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 3rem 2rem;
            width: 380px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 30px var(--accent-glow);
            transition: all 0.5s ease;
            position: relative;
        }

        .lock-card::after {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(135deg, var(--accent), transparent, var(--highlight));
            border-radius: 24px;
            z-index: -1;
            opacity: 0.15;
        }

        .lock-logo {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            color: var(--accent);
            text-shadow: 0 0 15px var(--accent-glow);
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .lock-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
            letter-spacing: 3px;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .lock-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .pass-input-wrapper {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .pass-input {
            width: 100%;
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fff;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: all 0.3s ease;
        }

        .pass-input:focus {
            border-color: var(--highlight);
            box-shadow: 0 0 12px var(--highlight-glow);
        }

        .unlock-btn {
            width: 100%;
            background: rgba(212, 175, 55, 0.12);
            border: 1.5px solid var(--accent);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .unlock-btn:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.02);
        }

        .error-msg {
            color: #ff3366;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            margin-top: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-msg.visible {
            opacity: 1;
        }

        /* --- MAIN INFINITY FLOW PORTAL VIEW --- */
        .portal-container {
            display: none;
            width: 100vw;
            height: 100vh;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 10;
        }

        .header {
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(5,5,5,0.9), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.03);
            z-index: 20;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Horizontal Infinity Flow Track Container */
        .infinity-flow-menu {
            flex-grow: 1;
            display: flex;
            align-items: center;
            overflow-x: auto;
            padding: 0 50px;
            gap: 40px;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* Firefox */
        }

        .infinity-flow-menu::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .track-card {
            flex: 0 0 420px;
            height: 60vh;
            background: rgba(15, 15, 20, 0.45);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            scroll-snap-align: center;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .track-card:hover {
            border-color: var(--highlight);
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.7), 0 0 15px var(--highlight-glow);
        }

        .media-pane {
            width: 100%;
            height: 60%;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .media-pane iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .card-details {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .track-index {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            color: var(--highlight);
            letter-spacing: 2px;
            margin-bottom: 4px;
        }

        .track-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            color: #fff;
            margin-bottom: 6px;
        }

        .track-desc {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* --- THE GATEWAY CALL TO ACTION FOOTER --- */
        .footer-gateway {
            padding: 30px;
            text-align: center;
            background: linear-gradient(to top, rgba(5,5,5,0.9), transparent);
            border-top: 1px solid rgba(255,255,255,0.03);
            z-index: 20;
        }

        .gateway-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: rgba(0, 229, 255, 0.08);
            border: 1.5px solid var(--highlight);
            border-radius: 30px;
            padding: 12px 32px;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 0 15px rgba(0, 229, 255, 0.1);
        }

        .gateway-btn:hover {
            background: var(--highlight);
            color: #000;
            box-shadow: 0 0 25px var(--highlight-glow);
            transform: translateY(-2px);
        }

        .gateway-btn span {
            margin-left: 10px;
            transition: transform 0.3s;
        }

        .gateway-btn:hover span {
            transform: translateX(4px);
        }

        /* --- WHITE-LABEL ADMIN PANEL --- */
        .admin-panel {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.95);
            width: 400px; max-width: 90%;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1.5px solid var(--accent);
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 0 50px rgba(0,0,0,0.9), 0 0 20px var(--accent-glow);
            z-index: 2000;
            display: none;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .admin-panel.open {
            display: block;
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .admin-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
            font-weight: 900;
        }
        .admin-row {
            margin-bottom: 12px;
        }
        .admin-label {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            color: var(--text-muted);
            display: block;
            margin-bottom: 4px;
            text-transform: uppercase;
        }
        .admin-input {
            width: 100%;
            background: rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px 12px;
            color: #fff;
            font-size: 0.8rem;
            outline: none;
            font-family: 'Share Tech Mono', monospace;
        }
        .admin-input:focus {
            border-color: var(--highlight);
        }
        .admin-save-btn {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            border-radius: 6px;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            letter-spacing: 1px;
        }
        .admin-save-btn:hover {
            background: #fff;
        }
        .admin-gear {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .admin-gear:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Admin Gear Toggle Button -->
    <div class="admin-gear" onclick="toggleAdminPanel()" title="White-Label Admin Suite">⚙️</div>

    <!-- White-Label Admin Control Panel -->
    <div class="admin-panel" id="admin-modal" style="width: 450px;">
        <div class="admin-title" style="margin-bottom: 5px;">PORTAL BUILDER & ONBOARDING SUITE</div>
        
        <!-- Tab Navigation -->
        <div style="display: flex; gap: 4px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 8px;">
            <button id="tab-btn-config" onclick="switchAdminTab('config')" style="flex: 1; padding: 6px; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700; background: var(--accent); color: #000; border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px;">1. BRAND CONFIG</button>
            <button id="tab-btn-onboard" onclick="switchAdminTab('onboard')" style="flex: 1; padding: 6px; font-family: 'Orbitron', sans-serif; font-size: 0.6rem; font-weight: 700; background: rgba(255,255,255,0.05); color: #888; border: none; cursor: pointer; border-radius: 4px; letter-spacing: 1px;">2. ARTIST ONBOARD</button>
        </div>
        
        <!-- Tab 1: Configuration -->
        <div id="admin-tab-config">
            <div class="admin-row">
                <label class="admin-label">Store/Client Brand Name</label>
                <input type="text" id="admin-brand-name" class="admin-input" placeholder="e.g. COREY'S EXCLUSIVE STORE">
            </div>
            <div class="admin-row">
                <label class="admin-label">Decryption Password (Sealed Vault Key)</label>
                <input type="text" id="admin-vault-key" class="admin-input" placeholder="e.g. D9_LOVE">
            </div>
            <div class="admin-row">
                <label class="admin-label">Retail License Price Display</label>
                <input type="text" id="admin-price" class="admin-input" placeholder="e.g. $19.99 USD">
            </div>
            <div class="admin-row">
                <label class="admin-label">Accent Flow Color</label>
                <select id="admin-color-select" class="admin-input" style="color: #fff; background: #000;">
                    <option value="#d4af37">Gold (#d4af37)</option>
                    <option value="#00e5ff">Cyber Cyan (#00e5ff)</option>
                    <option value="#ff0080">Hot Magenta (#ff0080)</option>
                    <option value="#00ff41">Matrix Green (#00ff41)</option>
                </select>
            </div>
        </div>

        <!-- Tab 2: Onboarding & Album Minting -->
        <div id="admin-tab-onboard" style="display: none; max-height: 320px; overflow-y: auto; padding-right: 4px;">
            <div class="admin-row">
                <label class="admin-label">Artist Profile Name</label>
                <input type="text" id="artist-name" class="admin-input" placeholder="e.g. Corey">
            </div>
            <div class="admin-row">
                <label class="admin-label">Short Profile Bio</label>
                <input type="text" id="artist-bio" class="admin-input" placeholder="e.g. Rhythm designer & beats producer">
            </div>
            
            <div style="border-top: 1px dashed rgba(255,255,255,0.08); margin: 15px 0; padding-top: 10px;">
                <label class="admin-label" style="font-weight: 700; color: #fff;">Current Video Playlist</label>
                <div id="admin-videos-list" style="background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; max-height: 120px; overflow-y: auto; padding: 8px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 6px; font-family: 'Share Tech Mono', monospace; font-size: 0.75rem;">
                    <!-- Dynamically populated -->
                </div>
            </div>

            <!-- Form to add a video -->
            <div style="border-top: 1px dashed rgba(255,255,255,0.08); padding-top: 10px;">
                <span class="admin-label" style="font-weight: 700; color: #fff; margin-bottom: 8px;">➕ Add Video to Playlist</span>
                
                <div class="admin-row">
                    <input type="text" id="new-video-title" class="admin-input" placeholder="Video Title (e.g. Auckland Octagon)">
                </div>
                <div class="admin-row">
                    <input type="text" id="new-video-url" class="admin-input" placeholder="Embed URL or direct MP4 link">
                </div>
                <div class="admin-row">
                    <input type="text" id="new-video-desc" class="admin-input" placeholder="Video Description / Notes">
                </div>
                <button class="admin-save-btn" style="background: rgba(0, 229, 255, 0.15); border: 1.5px solid var(--accent); color: #fff; font-family: 'Orbitron', sans-serif; margin-top: 0; margin-bottom: 10px;" onclick="addNewVideoToState()">+ ADD VIDEO TO LIST</button>
            </div>
        </div>

        <button class="admin-save-btn" onclick="saveAdminSettings()">MINT & SAVE CONFIGURATION</button>
        <button class="admin-save-btn" style="background: rgba(0, 229, 255, 0.15); border: 1.5px solid var(--accent); color: #fff; font-family: 'Orbitron', sans-serif; margin-top: 5px;" onclick="exportStandaloneHTML()">📥 DOWNLOAD STANDALONE HTML</button>
        <button class="admin-save-btn" style="background: rgba(255,255,255,0.05); color: #888; border: 1px solid rgba(255,255,255,0.1); margin-top: 5px;" onclick="toggleAdminPanel()">CANCEL</button>
    </div>

    <!-- SECURE SEALED VAULT PASS SCREEN -->
    <div class="lock-container" id="lock-screen">
        <div class="lock-card">
            <div class="lock-logo">🔒</div>
            <h2 class="lock-title" id="lock-card-title">Sealed Vault</h2>
            <p class="lock-subtitle" id="lock-card-subtitle">Exclusive Digital Album</p>
            <div class="pass-input-wrapper">
                <input type="password" id="vault-pass" class="pass-input" placeholder="DECRYPTION KEY" onkeydown="handleKey(event)">
            </div>
            <button class="unlock-btn" onclick="attemptDecrypt()">DECRYPT GATEWAY</button>
            <div class="error-msg" id="error-alert">ACCESS DENIED • KEY NOT VALID</div>
            <div id="price-tag-display" style="font-size: 0.65rem; color: var(--accent); margin-top: 15px; font-family: 'Orbitron', sans-serif; letter-spacing: 1px; font-weight: 700;">
                LICENSE VALUE: $19.99 USD
            </div>
            <div style="font-size: 0.55rem; color: var(--text-muted); margin-top: 10px; font-family: 'Share Tech Mono', monospace; letter-spacing: 1px;">
                DEFAULT DECRYPTION KEY: <span id="hint-key-label" style="color: var(--accent);">D9_LOVE</span>
            </div>
        </div>
    </div>

    <!-- MAIN IMMERSIVE PORTAL GATEWAY -->
    <div class="portal-container" id="portal-view">
        <header class="header">
            <div class="logo-text" id="portal-logo">FLUID MOTION TV</div>
            <div style="font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--accent);" id="session-brand">SECURE DECRYPTED SESSION</div>
        </header>

        <!-- INFINITY FLOW TRACK CONTROLLER -->
        <main class="infinity-flow-menu" id="flow-menu">
            <!-- Initial Tracks will be loaded dynamically -->
        </main>

        <!-- THE GATEWAY CTA FUNNEL -->
        <footer class="footer-gateway">
            <a href="http://localhost:8000/index.html" class="gateway-btn">
                SEE WHAT WE'RE UP TO <span>➡️</span>
            </a>
        </footer>
    </div>

    <script>
        // --- ADMIN SETTINGS LOCAL STORAGE CONTROLLER ---
        const defaultTracks = [
            { title: "Auckland Octagon", url: "https://www.youtube.com/embed/Myu96B_x8os?si=jsfzrIRVGOLCjBaA", desc: "Chronological recording of the Auckland Sovereign Node running phase-locked loop calculations." },
            { title: "Resonance Beats", url: "mock_audio", desc: "Decoded audio stream from the core group creative libraries, featuring high-resonance rhythmic splits." },
            { title: "Wellington Harbor", url: "https://www.youtube.com/embed/Myu96B_x8os", desc: "Acoustic field recording of master clock relax phase synchronizations along the sovereign grid line." }
        ];

        let currentSettings = {
            brandName: "Fluid Motion TV",
            vaultKey: "D9_LOVE",
            price: "$19.99 USD",
            accentColor: "#d4af37",
            artistName: "Corey",
            artistBio: "Rhythm designer & beats producer",
            tracks: []
        };
        let tempSettings = null; // Hold draft settings while editing

        function loadAdminSettings() {
            const saved = localStorage.getItem('d9_vault_settings');
            if (saved) {
                currentSettings = JSON.parse(saved);
            }
            if (!currentSettings.tracks || currentSettings.tracks.length === 0) {
                currentSettings.tracks = JSON.parse(JSON.stringify(defaultTracks));
            }
            applyConfigSettings();
            renderAlbumTracks();
        }

        function renderAlbumTracks() {
            const menu = document.getElementById('flow-menu');
            if (!menu) return;
            menu.innerHTML = ""; // Clear existing

            currentSettings.tracks.forEach((track, index) => {
                const card = document.createElement('div');
                card.className = 'track-card';
                
                let mediaHTML = "";
                const isDirectVideo = track.url && (track.url.endsWith(".mp4") || track.url.endsWith(".webm") || track.url.endsWith(".ogg") || track.url.includes("/assets/reels/") || track.url.includes("phone_backup/"));
                
                if (isDirectVideo) {
                    mediaHTML = `<video src="${track.url}" controls loop playsinline style="width: 100%; height: 100%; object-fit: cover; border-radius: 20px 20px 0 0; background: #000;"></video>`;
                } else if (track.url && (track.url.includes("youtube.com") || track.url.includes("youtu.be") || track.url.includes("facebook.com") || track.url.startsWith("http"))) {
                    let embedUrl = track.url;
                    // Auto convert watch links to embed links if possible
                    if (embedUrl.includes("youtube.com/watch?v=")) {
                        const videoId = new URL(embedUrl).searchParams.get("v");
                        embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    } else if (embedUrl.includes("youtu.be/")) {
                        const videoId = embedUrl.split("youtu.be/")[1].split("?")[0];
                        embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    }
                    mediaHTML = `<iframe src="${embedUrl}" allowfullscreen style="border: none; width: 100%; height: 100%;"></iframe>`;
                } else {
                    mediaHTML = `
                        <div style="width: 100%; height: 100%; background: linear-gradient(135deg, #161020 0%, #000 100%); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; border-radius: 20px 20px 0 0; z-index: 10;">
                            <span style="font-size: 3rem; filter: drop-shadow(0 0 10px var(--accent-glow));">💿</span>
                            <div style="font-family: 'Orbitron', sans-serif; font-size: 0.8rem; margin-top: 15px; color: var(--accent); font-weight: 700; letter-spacing: 1px;">${track.title.toUpperCase()}</div>
                            <div style="font-size: 0.55rem; color: var(--text-muted); margin-top: 5px; font-family: 'Share Tech Mono', monospace;">SOURCE: SECURE LOCAL VDO VAULT</div>
                        </div>`;
                }

                card.innerHTML = `
                    <div class="media-pane">${mediaHTML}</div>
                    <div class="card-details">
                        <div>
                            <div class="track-index">SECTOR ${String(index + 1).padStart(2, '0')}</div>
                            <h3 class="track-title">${track.title}</h3>
                        </div>
                        <p class="track-desc">${track.desc}</p>
                    </div>
                `;
                menu.appendChild(card);
            });
        }

        function applyConfigSettings() {
            document.getElementById('portal-logo').innerText = currentSettings.brandName.toUpperCase();
            document.getElementById('session-brand').innerText = `LICENSED FOR: ${currentSettings.brandName.toUpperCase()}`;
            document.getElementById('lock-card-title').innerText = currentSettings.brandName;
            document.getElementById('price-tag-display').innerText = `LICENSE VALUE: ${currentSettings.price}`;
            document.getElementById('hint-key-label').innerText = currentSettings.vaultKey;

            // Apply colors
            document.documentElement.style.setProperty('--accent', currentSettings.accentColor);
            let r = 212, g = 175, b = 55;
            if (currentSettings.accentColor.startsWith('#')) {
                const hex = currentSettings.accentColor.substring(1);
                if (hex.length === 6) {
                    r = parseInt(hex.substring(0, 2), 16);
                    g = parseInt(hex.substring(2, 4), 16);
                    b = parseInt(hex.substring(4, 6), 16);
                }
            }
            document.documentElement.style.setProperty('--accent-glow', `rgba(${r}, ${g}, ${b}, 0.25)`);
        }

        function switchAdminTab(tabName) {
            const configTab = document.getElementById('admin-tab-config');
            const onboardTab = document.getElementById('admin-tab-onboard');
            const configBtn = document.getElementById('tab-btn-config');
            const onboardBtn = document.getElementById('tab-btn-onboard');

            if (tabName === 'config') {
                configTab.style.display = 'block';
                onboardTab.style.display = 'none';
                configBtn.style.background = 'var(--accent)';
                configBtn.style.color = '#000';
                onboardBtn.style.background = 'rgba(255,255,255,0.05)';
                onboardBtn.style.color = '#888';
            } else {
                configTab.style.display = 'none';
                onboardTab.style.display = 'block';
                onboardBtn.style.background = 'var(--accent)';
                onboardBtn.style.color = '#000';
                configBtn.style.background = 'rgba(255,255,255,0.05)';
                configBtn.style.color = '#888';
                renderAdminVideosList();
            }
        }

        function renderAdminVideosList() {
            const listContainer = document.getElementById('admin-videos-list');
            listContainer.innerHTML = '';
            
            const tracks = tempSettings ? tempSettings.tracks : currentSettings.tracks;
            
            if (!tracks || tracks.length === 0) {
                listContainer.innerHTML = '<div style="color: var(--text-muted); text-align: center; padding: 10px;">No video tracks added yet.</div>';
                return;
            }

            tracks.forEach((track, index) => {
                const item = document.createElement('div');
                item.style.display = 'flex';
                item.style.justifyContent = 'space-between';
                item.style.alignItems = 'center';
                item.style.padding = '6px 8px';
                item.style.background = 'rgba(255, 255, 255, 0.02)';
                item.style.border = '1px solid rgba(255, 255, 255, 0.05)';
                item.style.borderRadius = '4px';

                const urlLabel = track.url.length > 25 ? track.url.substring(0, 22) + '...' : track.url;

                item.innerHTML = `
                    <div style="flex-grow: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 10px;">
                        <span style="color: var(--accent); font-weight: bold;">[${index + 1}]</span> 
                        <span style="color: #fff;">${track.title}</span> 
                        <span style="color: var(--text-muted); font-size: 0.65rem;">(${urlLabel})</span>
                    </div>
                    <button onclick="removeVideo(${index})" style="background: rgba(255, 0, 128, 0.15); border: 1px solid var(--highlight); color: var(--highlight); padding: 2px 6px; font-size: 0.6rem; cursor: pointer; border-radius: 3px; font-family: 'Orbitron', sans-serif;">DELETE</button>
                `;
                listContainer.appendChild(item);
            });
        }

        function removeVideo(index) {
            if (confirm("Are you sure you want to remove this video track?")) {
                if (tempSettings && tempSettings.tracks) {
                    tempSettings.tracks.splice(index, 1);
                } else {
                    currentSettings.tracks.splice(index, 1);
                }
                renderAdminVideosList();
            }
        }

        function addNewVideoToState() {
            const titleInput = document.getElementById('new-video-title');
            const urlInput = document.getElementById('new-video-url');
            const descInput = document.getElementById('new-video-desc');

            const title = titleInput.value.trim();
            const url = urlInput.value.trim();
            const desc = descInput.value.trim() || "Curated digital video asset.";

            if (!title || !url) {
                alert("Please enter both a title and video URL/path!");
                return;
            }

            const newTrack = {
                title: title,
                url: url,
                desc: desc
            };

            const target = tempSettings || currentSettings;
            if (!target.tracks) {
                target.tracks = [];
            }
            target.tracks.push(newTrack);

            // Reset inputs
            titleInput.value = '';
            urlInput.value = '';
            descInput.value = '';

            renderAdminVideosList();
            alert(`Added "${title}" to playlist. Save changes via "MINT & SAVE" or "DOWNLOAD STANDALONE".`);
        }

        function toggleAdminPanel() {
            const panel = document.getElementById('admin-modal');
            const isOpen = panel.classList.toggle('open');
            if (isOpen) {
                // Populate Tab 1 Config
                tempSettings = JSON.parse(JSON.stringify(currentSettings));
                
                document.getElementById('admin-brand-name').value = tempSettings.brandName;
                document.getElementById('admin-vault-key').value = tempSettings.vaultKey;
                document.getElementById('admin-price').value = tempSettings.price;
                document.getElementById('admin-color-select').value = tempSettings.accentColor;

                // Populate Tab 2 Onboard
                document.getElementById('artist-name').value = tempSettings.artistName || "";
                document.getElementById('artist-bio').value = tempSettings.artistBio || "";

                switchAdminTab('config');
            } else {
                tempSettings = null;
            }
        }

        function saveAdminSettings() {
            if (!tempSettings) return;

            // Read Tab 1 Config
            tempSettings.brandName = document.getElementById('admin-brand-name').value.trim() || "Fluid Motion TV";
            tempSettings.vaultKey = document.getElementById('admin-vault-key').value.trim() || "D9_LOVE";
            tempSettings.price = document.getElementById('admin-price').value.trim() || "$19.99 USD";
            tempSettings.accentColor = document.getElementById('admin-color-select').value;

            // Read Tab 2 Onboard
            tempSettings.artistName = document.getElementById('artist-name').value.trim() || "Corey";
            tempSettings.artistBio = document.getElementById('artist-bio').value.trim() || "Producer";

            currentSettings = tempSettings;
            localStorage.setItem('d9_vault_settings', JSON.stringify(currentSettings));
            
            applyConfigSettings();
            renderAlbumTracks();
            toggleAdminPanel();

            alert(`[MINT SUCCESS] Encrypted Vault Minted!\n\nArtist Profile registered: ${currentSettings.artistName.toUpperCase()}\nAssets registered to the Fluid Motion of the Future Network for future Pathfinder synthesis.`);
        }

        async function exportStandaloneHTML() {
            try {
                // Ensure latest edits from input fields are gathered first
                const tempBrandName = document.getElementById('admin-brand-name').value.trim() || "Fluid Motion TV";
                const tempVaultKey = document.getElementById('admin-vault-key').value.trim() || "D9_LOVE";
                const tempPrice = document.getElementById('admin-price').value.trim() || "$19.99 USD";
                const tempAccentColor = document.getElementById('admin-color-select').value;
                const tempArtistName = document.getElementById('artist-name').value.trim() || "Corey";
                const tempArtistBio = document.getElementById('artist-bio').value.trim() || "Producer";

                const exportSettings = tempSettings ? JSON.parse(JSON.stringify(tempSettings)) : JSON.parse(JSON.stringify(currentSettings));
                exportSettings.brandName = tempBrandName;
                exportSettings.vaultKey = tempVaultKey;
                exportSettings.price = tempPrice;
                exportSettings.accentColor = tempAccentColor;
                exportSettings.artistName = tempArtistName;
                exportSettings.artistBio = tempArtistBio;

                // Fetch the source HTML of album.html
                const response = await fetch(window.location.href.split('?')[0]);
                if (!response.ok) throw new Error("Failed to fetch source HTML.");
                let htmlText = await response.text();

                // Build the target replacement block for currentSettings
                const settingsPattern = /let currentSettings = \{[\s\S]*?brandName:[\s\S]*?vaultKey:[\s\S]*?price:[\s\S]*?accentColor:[\s\S]*?artistName:[\s\S]*?artistBio:[\s\S]*?tracks:[\s\S]*?\};/;
                
                const newSettingsBlock = `let currentSettings = ${JSON.stringify(exportSettings, null, 12)};`;

                if (settingsPattern.test(htmlText)) {
                    htmlText = htmlText.replace(settingsPattern, newSettingsBlock);
                } else {
                    const simplePattern = /let currentSettings = \{[\s\S]*?\};/g;
                    htmlText = htmlText.replace(simplePattern, (match) => {
                        if (match.includes('brandName')) {
                            return newSettingsBlock;
                        }
                        return match;
                    });
                }

                // Create blob and download it
                const blob = new Blob([htmlText], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${exportSettings.brandName.toLowerCase().replace(/[^a-z0-9]/g, '_')}_vault.html`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                alert("Standalone sealed digital album asset compiled successfully! High-end music video vault generated.");
            } catch (err) {
                console.error(err);
                alert("Failed to export standalone HTML: " + err.message);
            }
        }

        // Initialize Settings
        loadAdminSettings();

        // --- INTERACTIVE FLUID CANVAS ---
        const canvas = document.createElement('canvas');
        canvas.style.position = 'fixed';
        canvas.style.top = '0';
        canvas.style.left = '0';
        canvas.style.width = '100vw';
        canvas.style.height = '100vh';
        canvas.style.zIndex = '1';
        canvas.style.pointerEvents = 'none';
        document.body.prepend(canvas);

        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        const particles = [];
        for (let i = 0; i < 40; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.4,
                radius: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.1
            });
        }

        function drawParticles() {
            ctx.clearRect(0, 0, width, height);
            
            // Draw gradient background flow
            const grad = ctx.createRadialGradient(width/2, height/2, 10, width/2, height/2, width*0.8);
            grad.addColorStop(0, '#0a0a14');
            grad.addColorStop(1, '#020205');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, width, height);

            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#d4af37';
            ctx.strokeStyle = accentColor;
            ctx.fillStyle = accentColor;

            particles.forEach((p, idx) => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(212, 175, 55, ${p.alpha})`;
                ctx.fill();

                for (let j = idx + 1; j < particles.length; j++) {
                    const p2 = particles[j];
                    const dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 180) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(212, 175, 55, ${(1 - dist/180) * 0.08})`;
                        ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        function handleKey(e) {
            if (e.key === 'Enter') {
                attemptDecrypt();
            }
        }

        function attemptDecrypt() {
            const val = document.getElementById('vault-pass').value.trim();
            const err = document.getElementById('error-alert');
            const lock = document.getElementById('lock-screen');
            const portal = document.getElementById('portal-view');

            if (val === currentSettings.vaultKey || val.toLowerCase() === currentSettings.vaultKey.toLowerCase()) {
                err.classList.remove('visible');
                lock.style.opacity = '0';
                lock.style.transform = 'translateY(-100vh)';
                
                setTimeout(() => {
                    lock.style.display = 'none';
                    portal.style.display = 'flex';
                    initInfinityScroll();
                }, 800);
            } else {
                err.classList.add('visible');
                setTimeout(() => { err.classList.remove('visible'); }, 3000);
            }
        }

        // --- INFINITY LOOPING SCROLL ---
        function initInfinityScroll() {
            const menu = document.getElementById('flow-menu');
            const cards = Array.from(menu.children);
            if (cards.length === 0) return;
            
            cards.forEach(card => {
                const cloneBefore = card.cloneNode(true);
                const cloneAfter = card.cloneNode(true);
                menu.insertBefore(cloneBefore, menu.firstChild);
                menu.appendChild(cloneAfter);
            });

            const cardWidth = cards[0].offsetWidth + 40; 
            const totalOriginalWidth = cards.length * cardWidth;
            menu.scrollLeft = totalOriginalWidth;

            menu.addEventListener('scroll', () => {
                if (menu.scrollLeft <= 50) {
                    menu.scrollLeft += totalOriginalWidth;
                } else if (menu.scrollLeft >= totalOriginalWidth * 2 - 100) {
                    menu.scrollLeft -= totalOriginalWidth;
                }
            });

            menu.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    menu.scrollLeft += e.deltaY;
                }
            });
        }
    </script>
