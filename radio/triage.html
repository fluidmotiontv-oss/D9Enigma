<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon 9 | Radio Triage & Submissions</title>
    <!-- Google Fonts Integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Orbitron:wght@400;600;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37; --cream: #f4e4bc; --purple-deep: #161020; --purple-mid: #5d4e75;
            --dark: #050505; --cyan: #00e5ff; --magenta: #ff0080; --matrix-green: #00ff41;
            --amber-glow: #ffaa00;
            
            --accent: var(--gold);
            --accent-glow: rgba(212, 175, 55, 0.25);
            --bg: var(--dark);
            --text: var(--cream);
            --primary: var(--purple-mid);
            --secondary: var(--purple-deep);
            --highlight: var(--cyan);
            --alert: var(--magenta);
        }

        .theme-matrix { 
            --accent: var(--matrix-green); --accent-glow: rgba(0, 255, 65, 0.3); 
            --bg: #000000; --text: #00ff41; --primary: #004400; --secondary: #002200; 
            --highlight: #00ff41; --alert: #ffffff; 
        }
        .theme-amber { 
            --accent: var(--amber-glow); --accent-glow: rgba(255, 170, 0, 0.3); 
            --bg: #100a00; --text: #ffcc00; --primary: #884400; --secondary: #442200; 
            --highlight: #ffee00; --alert: #ff4400; 
        }
        .theme-cyber { 
            --accent: var(--cyan); --accent-glow: rgba(0, 229, 255, 0.3); 
            --bg: #050010; --text: #ff00ff; --primary: #0055ff; --secondary: #001144; 
            --highlight: var(--magenta); --alert: #00ffff; 
        }
        .theme-fluid { 
            --accent: var(--cyan); --accent-glow: rgba(0, 229, 255, 0.3); 
            --bg: #00050d; --text: #ffffff; --primary: #00e5ff; --secondary: #001f3f; 
            --highlight: #ff0080; --alert: #00ff41; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'Inter', sans-serif; 
            padding: 20px; min-height: 100vh; display: flex; flex-direction: column;
            transition: background 0.8s ease, color 0.5s ease;
            position: relative;
            overflow-x: hidden;
        }

        /* Scanline Overlay */
        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.04), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.04));
            z-index: 9999;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
            opacity: 0.12;
            transition: opacity 0.5s ease;
        }

        .header {
            padding: 16px 28px; 
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(10, 10, 15, 0.45); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 12px; margin-bottom: 24px; z-index: 50;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.25);
            transition: border 0.5s ease;
            flex-wrap: wrap;
            gap: 15px;
        }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            text-decoration: none;
            color: inherit;
            font-size: 0.65rem;
            opacity: 0.75;
            font-family: 'Orbitron', sans-serif;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 32px;
            padding: 0 12px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .nav-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent);
            box-shadow: 0 0 10px var(--accent-glow);
            transform: translateY(-1px);
        }

        .theme-switcher { display: flex; gap: 8px; align-items: center; }
        .theme-btn { 
            width: 18px; height: 18px; border-radius: 50%; 
            border: 1.5px solid rgba(255, 255, 255, 0.4); 
            cursor: pointer; opacity: 0.6; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .theme-btn:hover { opacity: 1; transform: scale(1.25); }
        .theme-btn.active { opacity: 1; border-color: #fff; transform: scale(1.15); box-shadow: 0 0 10px var(--accent); }
        
        .btn-classic { background: var(--gold); }
        .btn-matrix { background: var(--matrix-green); }
        .btn-amber { background: var(--amber-glow); }
        .btn-cyber { background: var(--cyan); }
        .btn-fluid { background: linear-gradient(45deg, #00e5ff, #ff0080); }

        .dashboard-container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex-grow: 1;
        }

        .panel {
            background: rgba(10, 10, 15, 0.45); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px; padding: 24px; 
            display: flex; flex-direction: column; gap: 18px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: all 0.5s ease;
        }

        .panel-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            color: var(--accent);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 8px;
            margin-bottom: 4px;
            font-weight: 700;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .tabs-header {
            display: flex;
            gap: 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 2px;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text);
            opacity: 0.6;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 10px 16px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            width: auto;
            box-shadow: none;
        }
        .tab-btn.active {
            opacity: 1;
            color: var(--accent);
            border-bottom: 2px solid var(--accent);
        }
        .tab-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: none;
            transform: none;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        .tab-content.active {
            display: flex;
        }

        /* Form styling */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        input[type="text"], input[type="number"], textarea, select {
            padding: 12px;
            background: rgba(0, 0, 0, 0.6);
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.8rem;
            outline: none;
            transition: all 0.3s;
        }
        input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus {
            border-color: var(--highlight);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        button.action-btn {
            background: var(--primary); color: #fff; border: 1.5px solid rgba(255, 255, 255, 0.15); 
            padding: 12px; border-radius: 6px; cursor: pointer; 
            font-family: 'Orbitron', sans-serif; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; font-size: 0.75rem;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            width: auto;
            align-self: flex-start;
        }
        button.action-btn:hover:not(:disabled) { 
            background: var(--accent); color: var(--secondary); 
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateY(-1px);
        }

        /* Queue section styling */
        .queue-sections {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .queue-group {
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            padding: 16px;
            background: rgba(0, 0, 0, 0.2);
        }
        .queue-group-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            letter-spacing: 1px;
            margin-bottom: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            text-transform: uppercase;
        }

        .track-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .track-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }
        .track-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .track-meta {
            display: flex;
            flex-direction: column;
            gap: 4px;
            flex-grow: 1;
        }
        .track-title-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .track-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            color: #fff;
        }
        .track-artist {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            background: rgba(255, 255, 255, 0.05);
            color: var(--accent);
            padding: 2px 6px;
            border-radius: 4px;
        }
        .track-desc {
            font-size: 0.65rem;
            opacity: 0.75;
            line-height: 1.3;
        }
        .track-details {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.55rem;
            color: var(--highlight);
            display: flex;
            gap: 12px;
        }

        .track-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.55rem;
            border-radius: 4px;
            border: 1.5px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .btn-sm:hover:not(:disabled) {
            transform: scale(1.05);
        }
        .btn-approve {
            background: rgba(0, 255, 65, 0.1);
            border-color: var(--matrix-green);
            color: var(--matrix-green);
        }
        .btn-approve:hover:not(:disabled) {
            background: var(--matrix-green);
            color: #000;
        }
        .btn-reject {
            background: rgba(255, 0, 128, 0.1);
            border-color: var(--magenta);
            color: var(--magenta);
        }
        .btn-reject:hover:not(:disabled) {
            background: var(--magenta);
            color: #fff;
        }
        .btn-delete {
            background: rgba(255, 255, 255, 0.02);
            border-color: rgba(255, 255, 255, 0.2);
            color: #ccc;
        }
        .btn-delete:hover:not(:disabled) {
            background: #fff;
            color: #000;
        }
        .btn-audition {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--highlight);
            color: var(--highlight);
        }
        .btn-audition:hover:not(:disabled) {
            background: var(--highlight);
            color: #000;
        }

        .empty-indicator {
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            opacity: 0.5;
            padding: 12px 0;
            text-align: center;
        }

        /* Audition Player HUD */
        .audition-hud {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(255, 255, 255, 0.03);
            border: 1.5px dashed rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 12px;
            gap: 16px;
            margin-bottom: 8px;
        }

        /* Log terminal panel */
        .log-panel {
            background: rgba(5, 5, 5, 0.85); 
            color: var(--accent); font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem; padding: 12px 18px; border-radius: 8px; height: 100px;
            overflow-y: auto; border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            width: 100%;
        }

        /* Admin authentication overlay */
        .admin-auth-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="theme-switcher">
        <div class="theme-btn btn-classic" title="Classic" onclick="setTheme('classic')"></div>
        <div class="theme-btn btn-matrix" title="Matrix" onclick="setTheme('matrix')"></div>
        <div class="theme-btn btn-amber" title="Amber" onclick="setTheme('amber')"></div>
        <div class="theme-btn btn-cyber" title="Cyber" onclick="setTheme('cyber')"></div>
        <div class="theme-btn btn-fluid" title="Fluid" onclick="setTheme('fluid')" style="background: linear-gradient(45deg, #00e5ff, #ff0080); border: 1.5px solid #fff;"></div>
    </div>
    <div style="text-align: center; flex-grow: 1;">
        <div style="color: var(--accent); font-size: 1.3rem; letter-spacing: 5px; font-weight: 900; font-family: 'Orbitron', sans-serif; transition: color 0.5s ease;">DRAGON 9 | RADIO TRIAGE</div>
        <div style="font-size: 0.6rem; color: var(--accent); opacity: 0.8; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; margin-top: 4px;">SUBMISSION SYSTEM & CURATOR FEED MODERATION</div>
    </div>
    <div class="nav-links">
        <a href="index.html" class="nav-btn">📻 BACK TO RADIO</a>
        <a href="../apps.html" class="nav-btn">🌌 APPS</a>
    </div>
</div>

<div class="dashboard-container">
    
    <!-- Tab Controls -->
    <div class="tabs-header">
        <button class="tab-btn active" onclick="switchTab('submit')">🎨 Artist Submissions</button>
        <button class="tab-btn" onclick="switchTab('triage')">🎛️ Curator Triage Queue</button>
    </div>

    <!-- Tab 1: Submit Track Form -->
    <div id="tab-submit" class="tab-content active panel">
        <div class="panel-title">📡 Broadcast Submission Terminal</div>
        
        <form id="submission-form" onsubmit="submitTrack(event)">
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label" for="track-title">🎵 Track Title *</label>
                    <input type="text" id="track-title" required placeholder="e.g. Mycelium Echoes">
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="track-artist">🧑‍🎨 Artist Name *</label>
                    <input type="text" id="track-artist" required placeholder="e.g. Gino Permaculture">
                </div>

                <div class="form-group">
                    <label class="form-label" for="track-url">🔗 Audio File URL / Asset Path *</label>
                    <input type="text" id="track-url" required placeholder="e.g. ../assets/music/mycelium_loop_528.mp3 or https://example.com/audio.mp3">
                </div>

                <div class="form-group">
                    <label class="form-label" for="track-price">💎 Price / Reward (H-Notes)</label>
                    <input type="number" id="track-price" min="0" value="5" placeholder="H-Notes required to play">
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label class="form-label" for="track-desc">📝 Track Description</label>
                    <textarea id="track-desc" rows="3" placeholder="Brief explanation of the frequency, vibes, and composition style..."></textarea>
                </div>

                <div class="form-group" style="grid-column: span 2;">
                    <label class="form-label" for="track-payment">💳 Direct Support / Payment Address</label>
                    <input type="text" id="track-payment" placeholder="PayPal, Venmo, or Crypto Address for direct tips">
                </div>
            </div>

            <div style="margin-top: 15px; display: flex; gap: 10px; justify-content: flex-end;">
                <button type="submit" class="action-btn">🚀 Submit to Queue</button>
            </div>
        </form>
    </div>

    <!-- Tab 2: Triage Panel -->
    <div id="tab-triage" class="tab-content panel">
        <div class="admin-auth-header">
            <div class="panel-title" style="border: none; margin: 0; padding: 0;">🎚️ Master Feed Moderator</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <span id="admin-status" style="font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--alert);">🔒 LOCK MODE</span>
                <button onclick="toggleAdminAuth()" class="btn-sm" id="btn-admin-auth" style="padding: 4px 8px; font-size: 0.55rem;">UNLOCK</button>
            </div>
        </div>

        <!-- Audition Player HUD -->
        <div class="audition-hud">
            <div style="display: flex; align-items: center; gap: 10px;">
                <span style="font-size: 1.4rem;">🎧</span>
                <div style="display: flex; flex-direction: column;">
                    <span style="font-family: 'Orbitron', sans-serif; font-size: 0.55rem; color: var(--highlight);">Audition Monitor</span>
                    <span id="audition-track-name" style="font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: #fff;">No track selected</span>
                </div>
            </div>
            <audio id="audition-player" controls style="height: 28px; width: 220px; filter: invert(1) hue-rotate(180deg); opacity: 0.85; outline: none;"></audio>
        </div>

        <div class="queue-sections">
            
            <!-- Pending Triage Group -->
            <div class="queue-group" style="border-color: rgba(255, 170, 0, 0.25);">
                <div class="queue-group-title" style="color: var(--amber-glow);">⏳ Pending Triage</div>
                <div id="pending-list" class="track-list">
                    <!-- Dynamic -->
                </div>
            </div>

            <!-- Approved Feed Group -->
            <div class="queue-group" style="border-color: rgba(0, 255, 65, 0.25);">
                <div class="queue-group-title" style="color: var(--matrix-green);">💿 Approved Broadcast Feed</div>
                <div id="approved-list" class="track-list">
                    <!-- Dynamic -->
                </div>
            </div>

            <!-- Rejected Feed Group -->
            <div class="queue-group" style="border-color: rgba(255, 0, 128, 0.25);">
                <div class="queue-group-title" style="color: var(--alert);">🗑️ Rejected / Archive</div>
                <div id="rejected-list" class="track-list">
                    <!-- Dynamic -->
                </div>
            </div>

        </div>
    </div>

    <!-- Logs Console -->
    <div class="log-panel" id="logger"></div>

</div>

<script>
    let activeTheme = 'classic';
    const logger = document.getElementById('logger');
    let submissionsCache = [];
    let isAdminUnlocked = false;

    function log(msg, type = 'SYSTEM') {
        const entry = document.createElement('div');
        entry.textContent = `[${type}] ${msg}`;
        if (logger) {
            logger.prepend(entry);
        }
    }

    // Theme Manager
    function setTheme(theme) {
        document.body.className = '';
        if (theme !== 'classic') {
            document.body.classList.add('theme-' + theme);
        }
        document.querySelectorAll('.theme-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.classList.contains('btn-' + theme)) {
                btn.classList.add('active');
            }
        });
        activeTheme = theme;
        log(`Switched theme to: ${theme.toUpperCase()}`);
    }

    // Tab switcher
    function switchTab(tabName) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        
        // Find the button and content matching the tabName
        const targetBtn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.toLowerCase().includes(tabName));
        if (targetBtn) targetBtn.classList.add('active');
        
        const targetContent = document.getElementById('tab-' + tabName);
        if (targetContent) targetContent.classList.add('active');
        
        log(`Switched tab to: ${tabName.toUpperCase()}`);
    }

    // Toggle Admin Mode
    function toggleAdminAuth() {
        if (isAdminUnlocked) {
            isAdminUnlocked = false;
            document.getElementById('admin-status').textContent = '🔒 LOCK MODE';
            document.getElementById('admin-status').style.color = 'var(--alert)';
            document.getElementById('btn-admin-auth').textContent = 'UNLOCK';
            log("Admin Mode LOCKED.");
            renderSubmissions();
        } else {
            const pass = prompt("Enter curator authorization passcode:");
            if (pass === 'dragon9') {
                isAdminUnlocked = true;
                document.getElementById('admin-status').textContent = '🔓 ADMIN ACTIVE';
                document.getElementById('admin-status').style.color = 'var(--matrix-green)';
                document.getElementById('btn-admin-auth').textContent = 'LOCK';
                log("Admin Mode UNLOCKED successfully.", "SUCCESS");
                renderSubmissions();
            } else if (pass !== null) {
                alert("Curator passcode invalid.");
                log("Failed curator auth attempt.", "ERROR");
            }
        }
    }

    // Load Submissions
    async function loadSubmissions() {
        try {
            const response = await fetch('/api/get-radio-submissions');
            if (response.ok) {
                const res = await response.json();
                submissionsCache = Array.isArray(res) ? res : (res.tracks || []);
                log(`Loaded ${submissionsCache.length} tracks from backend.`, "SUCCESS");
                renderSubmissions();
            }
        } catch (err) {
            log("Error contacting submissions API. Using fallback offline list.", "ERROR");
        }
    }

    // Submit Track Form
    async function submitTrack(e) {
        e.preventDefault();
        const title = document.getElementById('track-title').value.trim();
        const artist = document.getElementById('track-artist').value.trim();
        const url = document.getElementById('track-url').value.trim();
        const price = parseInt(document.getElementById('track-price').value || 5);
        const desc = document.getElementById('track-desc').value.trim();
        const payment = document.getElementById('track-payment').value.trim();

        if (!title || !artist || !url) {
            alert("Please fill in all required fields.");
            return;
        }

        const payload = {
            title,
            artist,
            url,
            price,
            desc,
            payment,
            status: 'pending',
            timestamp: Math.floor(Date.now() / 1000)
        };

        try {
            const response = await fetch('/api/submit-to-radio', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                const data = await response.json();
                log(`Successfully submitted track "${title}" by ${artist}.`, "SUCCESS");
                alert(`🚀 Submission queued! Track "${title}" is now awaiting triage.`);
                document.getElementById('submission-form').reset();
                loadSubmissions();
            } else {
                const err = await response.json();
                log(`Submission failed: ${err.message || 'Unknown error'}`, "ERROR");
            }
        } catch (error) {
            log(`Failed to submit track: ${error.message}`, "ERROR");
        }
    }

    // Triage track status change
    async function triageTrack(url, newStatus) {
        if (!isAdminUnlocked) {
            alert("Curator Authorization required to perform triage actions.");
            return;
        }

        const actionWord = newStatus === 'deleted' ? 'Permanently delete' : `Mark track as ${newStatus}`;
        if (!confirm(`Are you sure you want to: ${actionWord}?`)) return;

        try {
            const response = await fetch('/api/triage-radio-track', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ src: url, status: newStatus })
            });

            if (response.ok) {
                log(`Track status updated to ${newStatus.toUpperCase()}.`, "SUCCESS");
                loadSubmissions();
            } else {
                const err = await response.json();
                log(`Triage action failed: ${err.message || 'Unknown error'}`, "ERROR");
            }
        } catch (error) {
            log(`Triage request failed: ${error.message}`, "ERROR");
        }
    }

    // Audition track
    function auditionTrack(title, artist, url) {
        const player = document.getElementById('audition-player');
        const label = document.getElementById('audition-track-name');
        if (!player || !label) return;
        
        // Correct path to asset if it is relative
        const relativeUrl = url.startsWith('assets/') ? '../' + url : url;
        player.src = relativeUrl;
        label.textContent = `${title} (${artist.toUpperCase()})`;
        
        player.play().catch(e => {
            log(`Playback failed. Check if audio file exists: ${relativeUrl}`, "WARNING");
        });
        log(`Auditioning: ${title} by ${artist}`);
    }

    // Render Submissions into buckets
    function renderSubmissions() {
        const pendingContainer = document.getElementById('pending-list');
        const approvedContainer = document.getElementById('approved-list');
        const rejectedContainer = document.getElementById('rejected-list');

        pendingContainer.innerHTML = '';
        approvedContainer.innerHTML = '';
        rejectedContainer.innerHTML = '';

        let pendingCount = 0;
        let approvedCount = 0;
        let rejectedCount = 0;

        submissionsCache.forEach(t => {
            const status = t.status || 'approved'; // default legacy to approved
            
            const card = document.createElement('div');
            card.className = 'track-card';
            
            const meta = document.createElement('div');
            meta.className = 'track-meta';
            
            const titleRow = document.createElement('div');
            titleRow.className = 'track-title-row';
            
            const titleSpan = document.createElement('span');
            titleSpan.className = 'track-title';
            titleSpan.textContent = t.title;
            
            const artistSpan = document.createElement('span');
            artistSpan.className = 'track-artist';
            artistSpan.textContent = t.artist.toUpperCase();
            
            titleRow.appendChild(titleSpan);
            titleRow.appendChild(artistSpan);
            
            const descDiv = document.createElement('div');
            descDiv.className = 'track-desc';
            descDiv.textContent = t.desc || 'No description provided.';
            
            const detailsDiv = document.createElement('div');
            detailsDiv.className = 'track-details';
            
            const priceSpan = document.createElement('span');
            priceSpan.textContent = `💎 ${t.price} HN`;
            
            const pathSpan = document.createElement('span');
            pathSpan.textContent = `📂 ${t.src}`;
            
            detailsDiv.appendChild(priceSpan);
            detailsDiv.appendChild(pathSpan);
            
            if (t.payment) {
                const paySpan = document.createElement('span');
                paySpan.textContent = `💳 ${t.payment}`;
                detailsDiv.appendChild(paySpan);
            }
            
            meta.appendChild(titleRow);
            meta.appendChild(descDiv);
            meta.appendChild(detailsDiv);
            
            const actions = document.createElement('div');
            actions.className = 'track-actions';
            
            // Audition Button
            const audBtn = document.createElement('button');
            audBtn.className = 'btn-sm btn-audition';
            audBtn.textContent = '🎧 Audition';
            audBtn.onclick = () => auditionTrack(t.title, t.artist, t.src);
            actions.appendChild(audBtn);
            
            // Admin Action Buttons
            if (status === 'pending') {
                const appBtn = document.createElement('button');
                appBtn.className = 'btn-sm btn-approve';
                appBtn.textContent = '✔️ Approve';
                appBtn.disabled = !isAdminUnlocked;
                appBtn.onclick = () => triageTrack(t.src, 'approved');
                
                const rejBtn = document.createElement('button');
                rejBtn.className = 'btn-sm btn-reject';
                rejBtn.textContent = '❌ Reject';
                rejBtn.disabled = !isAdminUnlocked;
                rejBtn.onclick = () => triageTrack(t.src, 'rejected');
                
                actions.appendChild(appBtn);
                actions.appendChild(rejBtn);
            } else if (status === 'approved') {
                const rejBtn = document.createElement('button');
                rejBtn.className = 'btn-sm btn-reject';
                rejBtn.textContent = '❌ Move to Archive';
                rejBtn.disabled = !isAdminUnlocked;
                rejBtn.onclick = () => triageTrack(t.src, 'rejected');
                
                actions.appendChild(rejBtn);
            } else if (status === 'rejected') {
                const appBtn = document.createElement('button');
                appBtn.className = 'btn-sm btn-approve';
                appBtn.textContent = '✔️ Approve';
                appBtn.disabled = !isAdminUnlocked;
                appBtn.onclick = () => triageTrack(t.src, 'approved');
                
                const delBtn = document.createElement('button');
                delBtn.className = 'btn-sm btn-delete';
                delBtn.textContent = '🗑️ Delete';
                delBtn.disabled = !isAdminUnlocked;
                delBtn.onclick = () => triageTrack(t.src, 'deleted');
                
                actions.appendChild(appBtn);
                actions.appendChild(delBtn);
            }
            
            card.appendChild(meta);
            card.appendChild(actions);

            if (status === 'pending') {
                pendingContainer.appendChild(card);
                pendingCount++;
            } else if (status === 'approved') {
                approvedContainer.appendChild(card);
                approvedCount++;
            } else if (status === 'rejected') {
                rejectedContainer.appendChild(card);
                rejectedCount++;
            }
        });

        if (pendingCount === 0) {
            pendingContainer.innerHTML = '<div class="empty-indicator">No pending submissions in queue.</div>';
        }
        if (approvedCount === 0) {
            approvedContainer.innerHTML = '<div class="empty-indicator">No approved tracks in broadcast rotation.</div>';
        }
        if (rejectedCount === 0) {
            rejectedContainer.innerHTML = '<div class="empty-indicator">No rejected or archived tracks.</div>';
        }
    }

    // Init
    window.onload = () => {
        setTheme('classic');
        loadSubmissions();
    };
</script>
</body>
</html>
